<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bravo FM 91.3</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Serif TC", serif;
      background: #F5F1E8;
      color: #2A2520;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 480px;
      width: 100%;
      background: #FFFFFF;
      border: 1px solid #E6DFD0;
      padding: 40px 32px;
      text-align: center;
    }
    .kicker {
      font-size: 11px;
      letter-spacing: 2px;
      color: #9A8F7E;
      font-weight: 700;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 28px;
      margin: 0 0 8px;
      letter-spacing: 0.5px;
    }
    .sub {
      font-size: 14px;
      color: #6E6355;
      margin: 0 0 32px;
    }
    .bar {
      height: 2px;
      width: 48px;
      background: #C8622A;
      margin: 0 auto 24px;
    }
    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: #C8622A;
      color: #FFFFFF;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 1px;
      margin-top: 8px;
    }
    .btn-secondary {
      background: transparent;
      color: #C8622A;
      border: 1px solid #C8622A;
      margin-left: 8px;
    }
    footer {
      margin-top: 32px;
      font-size: 12px;
      color: #9A8F7E;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="bar"></div>
    <div class="kicker">BRAVO FM 91.3 · 分享連結</div>
    <h1 id="title">Bravo FM 91.3</h1>
    <p class="sub" id="subtitle">古典 · 爵士 · 世界音樂</p>
    <p id="description">在 iOS 上安裝 Bravo Radio App 後，點擊此連結即可直接開啟對應內容。</p>
    <a class="btn" id="openApp" href="#">在 App 中開啟</a>
    <!-- App Store 上架後取消下一行註解並填入連結 -->
    <!-- <a class="btn btn-secondary" href="https://apps.apple.com/tw/app/idXXXXXXXXX">下載 App</a> -->
  </div>
  <footer>© Bravo FM 91.3</footer>

  <script>
    // 從 URL path 判斷類型並改寫標題 / 按鈕
    const path = window.location.pathname;
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id') || '';
    const name = params.get('name') || '';
    const title = params.get('title') || '';
    const program = params.get('program') || '';

    const titleEl = document.getElementById('title');
    const subEl = document.getElementById('subtitle');
    const btn = document.getElementById('openApp');

    let kind = '';
    if (path.startsWith('/program')) {
      kind = 'program';
      if (name) titleEl.textContent = name;
      subEl.textContent = '節目';
    } else if (path.startsWith('/unit')) {
      kind = 'unit';
      if (name) titleEl.textContent = name;
      subEl.textContent = '精選單元';
    } else if (path.startsWith('/episode')) {
      kind = 'episode';
      if (title) titleEl.textContent = title;
      subEl.textContent = program ? `《${program}》` : '單集';
    }

    // 對應到 App 的 custom scheme（裝了 App 的話，Universal Link 已自動攔截；這是沒裝時的手動 fallback）
    if (kind && id) {
      const qs = new URLSearchParams(params).toString();
      btn.href = `bravo://${kind}?${qs}`;
    } else {
      btn.style.display = 'none';
    }
  </script>
</body>
</html>
