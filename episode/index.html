<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bravo FM 91.3</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Serif TC", serif;
      background: #F5F1E8;
      color: #2A2520;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 480px;
      width: 100%;
      background: #FFFFFF;
      border: 1px solid #E6DFD0;
      padding: 40px 32px;
      text-align: center;
    }
    .kicker {
      font-size: 11px;
      letter-spacing: 2px;
      color: #9A8F7E;
      font-weight: 700;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 26px;
      margin: 0 0 8px;
      letter-spacing: 0.5px;
      line-height: 1.3;
    }
    .sub {
      font-size: 14px;
      color: #6E6355;
      margin: 0 0 24px;
    }
    .bar {
      height: 2px;
      width: 48px;
      background: #C8622A;
      margin: 0 auto 24px;
    }
    audio {
      width: 100%;
      margin-top: 8px;
    }
    .hint {
      font-size: 13px;
      color: #9A8F7E;
      margin-top: 20px;
      line-height: 1.6;
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #C8622A;
      color: #FFFFFF;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 1px;
      font-size: 14px;
      margin-top: 16px;
    }
    footer {
      margin-top: 32px;
      font-size: 12px;
      color: #9A8F7E;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="bar"></div>
    <div class="kicker" id="kicker">BRAVO FM 91.3</div>
    <h1 id="title">Bravo FM 91.3</h1>
    <p class="sub" id="subtitle">古典・爵士・世界音樂</p>
    <audio id="player" controls style="display:none"></audio>
    <p class="hint" id="hint"></p>
  </div>
  <footer>© Bravo FM 91.3</footer>

  <script>
    const path = window.location.pathname;
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id') || '';
    const name = params.get('name') || '';
    const title = params.get('title') || '';
    const program = params.get('program') || '';
    const audio = params.get('audio') || '';

    const OFFICIAL = 'https://bravo913.com.tw/index.php';

    const kickerEl = document.getElementById('kicker');
    const titleEl = document.getElementById('title');
    const subEl = document.getElementById('subtitle');
    const playerEl = document.getElementById('player');
    const hintEl = document.getElementById('hint');

    // 節目／單元：直接轉官網（有 App 的話 iOS 會先攔截，這段不會執行）
    if (path.startsWith('/program') && id) {
      window.location.replace(OFFICIAL + '?route=choice/program_detail&choice_program_id=' + encodeURIComponent(id));
    } else if (path.startsWith('/unit') && id) {
      window.location.replace(OFFICIAL + '?route=choice/unit_detail&choice_program_id=' + encodeURIComponent(id));
    } else if (path.startsWith('/episode')) {
      // 單集：內嵌 <audio> 讓 Safari 直接播
      kickerEl.textContent = 'EPISODE · 單集';
      if (title) titleEl.textContent = title;
      subEl.textContent = program ? '《' + program + '》' : '';
      if (audio) {
        playerEl.src = audio;
        playerEl.style.display = 'block';
        hintEl.innerHTML = '裝有 Bravo Radio App 的 iPhone 會自動在 App 中開啟收聽。';
      } else {
        hintEl.textContent = '分享連結未附音檔來源，無法在瀏覽器中播放。';
      }
    } else if (path.startsWith('/program')) {
      kickerEl.textContent = 'PROGRAM · 節目';
      titleEl.textContent = name || '節目';
      hintEl.textContent = '缺少節目編號，無法跳轉官網。';
    } else if (path.startsWith('/unit')) {
      kickerEl.textContent = 'UNIT · 精選單元';
      titleEl.textContent = name || '單元';
      hintEl.textContent = '缺少單元編號，無法跳轉官網。';
    } else {
      // Root / 其他路徑：顯示 App 介紹
      hintEl.innerHTML = '收聽古典、爵士、世界音樂。<br>在 iOS 上安裝 Bravo Radio App 後，分享連結可直接在 App 中開啟。';
    }
  </script>
</body>
</html>
