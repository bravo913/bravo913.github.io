<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-itunes-app" content="app-argument=bravo://">
  <title>Bravo FM 91.3</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Noto Serif TC", serif;
      background: #F5F1EA;
      color: #2A2520;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 480px;
      width: 100%;
      background: #FFFFFF;
      border: 1px solid #E6DFD0;
      padding: 40px 32px;
      text-align: center;
    }
    .kicker {
      font-size: 11px;
      letter-spacing: 2px;
      color: #9A8F7E;
      font-weight: 700;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 26px;
      margin: 0 0 8px;
      letter-spacing: 0.5px;
      line-height: 1.3;
    }
    .sub {
      font-size: 14px;
      color: #6E6355;
      margin: 0 0 24px;
    }
    .logo {
      width: 96px;
      height: auto;
      display: block;
      margin: 0 auto 16px;
    }
    .bar {
      height: 2px;
      width: 48px;
      background: #4C3327;
      margin: 0 auto 24px;
    }
    audio {
      width: 100%;
      margin-top: 8px;
      margin-bottom: 16px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 1px;
      font-size: 15px;
      margin-top: 12px;
      text-align: center;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-primary {
      background: #4C3327;
      color: #FFFFFF;
    }
    .btn-primary:active { background: #32201A; }
    .btn-secondary {
      background: #FFFFFF;
      color: #2A2520;
      border: 1px solid #4C3327;
    }
    .btn-secondary:active { background: #EFE5D0; }
    .hint {
      font-size: 12px;
      color: #9A8F7E;
      margin-top: 20px;
      line-height: 1.6;
    }
    footer {
      margin-top: 32px;
      font-size: 12px;
      color: #9A8F7E;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="/logo.png" alt="Bravo FM 91.3">
    <div class="bar"></div>
    <div class="kicker" id="kicker">Bravo FM 91.3</div>
    <h1 id="title">Bravo FM 91.3</h1>
    <p class="sub" id="subtitle">古典・爵士・世界音樂</p>
    <audio id="player" controls style="display:none"></audio>
    <a id="btnApp" class="btn btn-primary" href="#" style="display:none">🎧 用 Bravo FM 91.3 App 開啟</a>
    <a id="btnWeb" class="btn btn-secondary" href="#" style="display:none" target="_blank" rel="noopener">🌐 在瀏覽器開啟官網</a>
    <p class="hint" id="hint"></p>
  </div>
  <footer>© Bravo FM 91.3</footer>

  <script>
    const path = window.location.pathname;
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id') || '';
    const name = params.get('name') || '';
    const title = params.get('title') || '';
    const program = params.get('program') || '';
    const audio = params.get('audio') || '';

    const OFFICIAL = 'https://bravo913.com.tw/index.php';

    const kickerEl = document.getElementById('kicker');
    const titleEl = document.getElementById('title');
    const subEl = document.getElementById('subtitle');
    const playerEl = document.getElementById('player');
    const hintEl = document.getElementById('hint');
    const btnApp = document.getElementById('btnApp');
    const btnWeb = document.getElementById('btnWeb');

    function showAppButton(url) {
      btnApp.href = url;
      btnApp.style.display = 'block';
    }
    function showWebButton(url, label) {
      btnWeb.href = url;
      if (label) btnWeb.textContent = label;
      btnWeb.style.display = 'block';
    }

    if (path.startsWith('/program') && id) {
      // 節目
      kickerEl.textContent = 'PROGRAM · 節目';
      titleEl.textContent = name || '節目';
      subEl.textContent = '';
      showAppButton('bravo://program?id=' + encodeURIComponent(id) + '&name=' + encodeURIComponent(name));
      showWebButton(OFFICIAL + '?route=choice/program_detail&choice_program_id=' + encodeURIComponent(id), '🌐 在瀏覽器開啟官網節目頁');
      hintEl.innerHTML = '裝有 Bravo FM 91.3 App 的 iPhone，點分享連結時會自動在 App 中開啟。<br>沒有 App 的裝置可選擇在瀏覽器檢視官網。';
    } else if (path.startsWith('/unit') && id) {
      // 單元
      kickerEl.textContent = 'UNIT · 精選單元';
      titleEl.textContent = name || '單元';
      subEl.textContent = '';
      showAppButton('bravo://unit?id=' + encodeURIComponent(id) + '&name=' + encodeURIComponent(name));
      showWebButton(OFFICIAL + '?route=choice/unit_detail&choice_program_id=' + encodeURIComponent(id), '🌐 在瀏覽器開啟官網單元頁');
      hintEl.innerHTML = '裝有 Bravo FM 91.3 App 的 iPhone，點分享連結時會自動在 App 中開啟。<br>沒有 App 的裝置可選擇在瀏覽器檢視官網。';
    } else if (path.startsWith('/episode')) {
      // 單集
      kickerEl.textContent = 'EPISODE · 單集';
      if (title) titleEl.textContent = title;
      subEl.textContent = program ? '《' + program + '》' : '';
      if (audio) {
        playerEl.src = audio;
        playerEl.style.display = 'block';
      }
      showAppButton('bravo://episode?id=' + encodeURIComponent(id) + '&title=' + encodeURIComponent(title) + '&program=' + encodeURIComponent(program));
      hintEl.innerHTML = '裝有 Bravo FM 91.3 App 的 iPhone，點分享連結時會自動在 App 中開啟。<br>沒有 App 也可直接在此頁面播放。';
    } else {
      // Root / 其他路徑
      hintEl.innerHTML = '收聽古典、爵士、世界音樂。<br>在 iOS 上安裝 Bravo FM 91.3 App 後，分享連結可直接在 App 中開啟。';
    }
  </script>
</body>
</html>
